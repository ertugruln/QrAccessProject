<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card shadow p-4" style="width: 25rem;">
    <div class="text-center mb-4">
      <h2 class="fw-bold text-primary">Giriş Yap</h2>
      <p class="text-muted">QR Geçiş Sistemine Hoş Geldiniz</p>
    </div>

    <form (ngSubmit)="onLogin()">
      <!-- Kullanıcı Adı Alanı (Eskiden E-Posta idi) -->
      <div class="mb-3">
        <label class="form-label fw-bold">Kullanıcı Adı</label>
        <input type="text" class="form-control" name="username" [(ngModel)]="loginObj.username" placeholder="Kullanıcı adınızı girin">
      </div>

      <!-- Şifre Alanı -->
      <div class="mb-4">
        <label class="form-label fw-bold">Şifre</label>
        <input type="password" class="form-control" name="password" [(ngModel)]="loginObj.password" placeholder="••••••••">
      </div>

      <!-- Giriş Butonu -->
      <button type="submit" class="btn btn-primary w-100 fw-bold fs-5">
        Sisteme Gir
      </button>
    </form>
  </div>
</div>
